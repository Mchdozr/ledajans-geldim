name: Plesk Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish src/Ledajans.Server/Ledajans.Server.csproj -c Release -o publish

      - name: Temizlik
        run: |
          rm -f publish/appsettings.Development.json
          rm -f publish/web.config
          mkdir -p publish/logs publish/scripts
          touch publish/logs/.gitkeep
          cp scripts/plesk-deploy-action.ps1 scripts/plesk-persist-webconfig.ps1 scripts/plesk-unlock-for-pull.ps1 scripts/check-health.ps1 publish/scripts/
          echo "${{ github.sha }}" | cut -c1-7 > publish/wwwroot/version.txt

      - name: deploy branch guncelle
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: publish
          branch: deploy
          single-commit: true
          clean: true
          commit-message: "deploy ${{ github.sha }}"
