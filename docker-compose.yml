services:
  mysql:
    image: mariadb:11
    container_name: ledajans-mysql-dev
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dev
      MYSQL_DATABASE: LedajansDb
    volumes:
      - ledajans_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      args:
        APP_VERSION: multi-location-v4
    container_name: ledajans-app-dev
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=LedajansDb;User=root;Password=dev;"
      Jwt__Key: "Ledajans-Dev-Key-Only-Not-For-Production-2026!!"
      Seed__AdminPassword: "Admin123!"
      Seed__CreateDemoEmployees: "true"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  ledajans_mysql_data:
